<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMS Standards Alignment Viewer</title>
<style>
:root {
  --bg: #f8f9fa; --card: #fff; --border: #dee2e6; --text: #212529;
  --primary: #2563eb; --primary-light: #dbeafe; --primary-dark: #1d4ed8;
  --green: #16a34a; --green-bg: #dcfce7; --red: #dc2626; --red-bg: #fee2e2;
  --yellow: #ca8a04; --yellow-bg: #fef9c3; --gray: #6b7280; --gray-bg: #f3f4f6;
  --orange: #ea580c; --orange-bg: #fff7ed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

.header { background: var(--primary-dark); color: #fff; padding: 12px 24px; display: flex;
  align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .subtitle { font-size: 12px; opacity: 0.8; }
.stats-bar { display: flex; gap: 16px; font-size: 13px; }
.stat { background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 4px; }
.stat b { color: #93c5fd; }

.tabs { display: flex; background: var(--card); border-bottom: 2px solid var(--border);
  padding: 0 24px; position: sticky; top: 48px; z-index: 99; }
.tab { padding: 10px 20px; cursor: pointer; font-weight: 500; color: var(--gray);
  border-bottom: 3px solid transparent; transition: all 0.15s; font-size: 13px; }
.tab:hover { color: var(--text); background: var(--gray-bg); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.content { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

.filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center;
  background: var(--card); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); }
.filters label { font-size: 12px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
.filters select, .filters input[type=text] { padding: 6px 10px; border: 1px solid var(--border);
  border-radius: 4px; font-size: 13px; background: #fff; }
.filters select { min-width: 140px; }
.filters input[type=text] { min-width: 200px; }
.filter-group { display: flex; flex-direction: column; gap: 2px; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px; }
.card h3 { font-size: 15px; margin-bottom: 8px; }

.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; text-align: center; }
.summary-card .number { font-size: 28px; font-weight: 700; }
.summary-card .label { font-size: 12px; color: var(--gray); margin-top: 4px; }
.summary-card.good .number { color: var(--green); }
.summary-card.warn .number { color: var(--yellow); }
.summary-card.bad .number { color: var(--red); }

table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data th { background: var(--gray-bg); padding: 8px 10px; text-align: left;
  font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border); position: sticky; top: 96px; z-index: 10; }
table.data td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.data tr:hover { background: var(--primary-light); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge.gap { background: var(--red-bg); color: var(--red); }
.badge.covered { background: var(--green-bg); color: var(--green); }
.badge.over { background: var(--yellow-bg); color: var(--yellow); }
.badge.dok { background: var(--primary-light); color: var(--primary); }
.badge.course { background: #ede9fe; color: #7c3aed; margin: 1px 2px; }

.tree { font-size: 13px; }
.tree-course { margin-bottom: 12px; }
.tree-course > .tree-header { font-weight: 700; font-size: 15px; padding: 10px 12px;
  background: var(--primary-dark); color: #fff; border-radius: 6px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center; }
.tree-chapter { margin-left: 20px; margin-top: 4px; }
.tree-chapter > .tree-header { font-weight: 600; padding: 6px 10px; background: var(--gray-bg);
  border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; }
.tree-section { margin-left: 20px; margin-top: 2px; }
.tree-module { display: flex; align-items: center; gap: 8px; padding: 4px 10px;
  border-bottom: 1px solid #f0f0f0; }
.tree-module:hover { background: var(--primary-light); }
.tree-module input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
.tree-module .lesson-id { font-family: monospace; min-width: 60px; font-weight: 500; }
.tree-module .concepts { flex: 1; color: var(--gray); font-size: 12px; }
.tree-module .std-count { font-size: 11px; color: var(--primary); font-weight: 600; }
.tree-children { display: none; }
.tree-children.open { display: block; }
.toggle { font-size: 10px; margin-right: 6px; }
.coverage-meter { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  width: 80px; display: inline-block; vertical-align: middle; margin-left: 8px; }
.coverage-meter .fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s; }

.impact-list { list-style: none; padding: 0; }
.impact-list li { padding: 6px 10px; border-left: 3px solid var(--red); margin-bottom: 4px;
  background: var(--red-bg); border-radius: 0 4px 4px 0; font-size: 13px; }
.impact-list.prereq li { border-left-color: var(--orange); background: var(--orange-bg); }
.impact-list.lateral li { border-left-color: var(--primary); background: var(--primary-light); }

.comparison-grid { display: grid; gap: 1px; background: var(--border); border-radius: 8px;
  overflow: hidden; font-size: 12px; }
.comparison-grid .cell { padding: 8px 10px; background: var(--card); }
.comparison-grid .cell.header { background: var(--gray-bg); font-weight: 600; }
.comparison-grid .cell.present { background: var(--green-bg); }
.comparison-grid .cell.missing { background: var(--red-bg); color: var(--gray); font-style: italic; }

@media (max-width: 768px) {
  .tabs { overflow-x: auto; }
  .tab { white-space: nowrap; font-size: 12px; padding: 8px 12px; }
  .content { padding: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>RMS Standards Alignment Viewer</h1>
    <div class="subtitle">Drummond Math Solutions &middot; CPM Curriculum vs MN Standards</div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="dashboard">Coverage Dashboard</div>
  <div class="tab" data-tab="gaps">Gap Analysis</div>
  <div class="tab" data-tab="tracker">Module Tracker</div>
  <div class="tab" data-tab="impact">Skip Impact</div>
  <div class="tab" data-tab="compare">Framework Comparison</div>
</div>

<div class="content">
  <div class="panel active" id="panel-dashboard">
    <div class="filters">
      <div class="filter-group">
        <label>Framework</label>
        <select id="fw-filter">
          <option value="MN-2022">MN 2022</option>
          <option value="CCSS-M">CCSS-M</option>
          <option value="MN-2007">MN 2007</option>
          <option value="TEKS">TEKS</option>
          <option value="FL-BEST">FL B.E.S.T.</option>
          <option value="VA-SOL">VA SOL</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Grade</label>
        <select id="grade-filter"><option value="">All Grades</option></select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="status-filter">
          <option value="">All</option>
          <option value="gap">Gaps Only</option>
          <option value="covered">Covered Only</option>
          <option value="over">Overcovered (3+)</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="search-filter" placeholder="Code, keyword, or domain...">
      </div>
    </div>
    <div class="summary-grid" id="dashSummary"></div>
    <div id="dashGrid"></div>
  </div>

  <div class="panel" id="panel-gaps">
    <div class="filters">
      <div class="filter-group">
        <label>Framework</label>
        <select id="gap-fw-filter">
          <option value="MN-2022">MN 2022</option>
          <option value="CCSS-M">CCSS-M</option>
          <option value="MN-2007">MN 2007</option>
          <option value="TEKS">TEKS</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Grade</label>
        <select id="gap-grade-filter"><option value="">All Grades</option></select>
      </div>
    </div>
    <div id="gapContent"></div>
  </div>

  <div class="panel" id="panel-tracker">
    <div class="filters">
      <div class="filter-group">
        <label>Course</label>
        <select id="tracker-course-filter"><option value="">All Courses</option></select>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:end">
        <button onclick="exportChecked()" style="padding:6px 12px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:12px;background:#fff">Export</button>
        <button onclick="clearChecked()" style="padding:6px 12px;border-radius:4px;border:1px solid var(--red);color:var(--red);cursor:pointer;font-size:12px;background:#fff">Clear All</button>
      </div>
    </div>
    <div id="trackerSummary" class="summary-grid"></div>
    <div id="trackerTree"></div>
  </div>

  <div class="panel" id="panel-impact">
    <div class="filters">
      <div class="filter-group">
        <label>Select Module to Analyze</label>
        <select id="impact-module-select" style="min-width:350px">
          <option value="">Choose a module...</option>
        </select>
      </div>
    </div>
    <div id="impactContent"><div class="card" style="text-align:center;padding:40px;color:var(--gray)">Select a module above to see the impact of skipping it.</div></div>
  </div>

  <div class="panel" id="panel-compare">
    <div class="filters">
      <div class="filter-group">
        <label>Grade</label>
        <select id="compare-grade-filter"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label>Topic Cluster</label>
        <select id="compare-cluster-filter"><option value="">All</option></select>
      </div>
    </div>
    <div id="compareContent"></div>
  </div>
</div>

<script>
let D = null;
let taught = {};

// ── Indexes (all keyed by string for JSON compat) ──
let stdById = {};
let modById = {};
let courseById = {};
let clusterById = {};
let stdToMods = {};   // string(std_id) → [{module_id, course_id, source}]
let modToStds = {};   // string(mod_id) → [{standard_id, framework, code, source}]

function lookup(map, id) { return map[String(id)] || []; }

async function init() {
  const resp = await fetch('data.json');
  D = await resp.json();
  try { taught = JSON.parse(localStorage.getItem('rms_taught') || '{}'); } catch(e) { taught = {}; }

  // Build indexes
  D.standards.forEach(s => stdById[s.id] = s);
  D.cpm_modules.forEach(m => modById[m.id] = m);
  D.cpm_courses.forEach(c => courseById[c.id] = c);
  D.topic_clusters.forEach(c => clusterById[c.id] = c);
  stdToMods = D.standard_to_modules || {};
  modToStds = D.module_to_standards || {};

  populateFilters();
  renderDashboard();
  renderGaps();
  renderTracker();
  populateImpactSelect();
  renderComparison();
  updateStatsBar();

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    });
  });

  ['fw-filter','grade-filter','status-filter'].forEach(id =>
    document.getElementById(id).addEventListener('change', renderDashboard));
  document.getElementById('search-filter').addEventListener('input', renderDashboard);
  ['gap-fw-filter','gap-grade-filter'].forEach(id =>
    document.getElementById(id).addEventListener('change', renderGaps));
  document.getElementById('tracker-course-filter').addEventListener('change', renderTracker);
  document.getElementById('impact-module-select').addEventListener('change', renderImpact);
  ['compare-grade-filter','compare-cluster-filter'].forEach(id =>
    document.getElementById(id).addEventListener('change', renderComparison));
}

function gradeSort(a, b) {
  const v = g => g === 'K' ? -1 : g === 'HS' ? 13 : (g||'').includes('9') && (g||'').includes('11') ? 10 : parseInt(g) || 99;
  return v(a) - v(b);
}

function populateFilters() {
  const grades = [...new Set(D.standards.map(s => s.grade).filter(Boolean))].sort(gradeSort);
  ['grade-filter','gap-grade-filter','compare-grade-filter'].forEach(id => {
    const sel = document.getElementById(id);
    grades.forEach(g => { const o = new Option('Grade ' + g, g); sel.add(o); });
  });
  D.cpm_courses.forEach(c => {
    document.getElementById('tracker-course-filter').add(new Option(c.name + ' (' + c.id + ')', c.id));
  });
  [...new Set(D.topic_clusters.map(c => c.name))].sort().forEach(n => {
    document.getElementById('compare-cluster-filter').add(new Option(n, n));
  });
}

function updateStatsBar() {
  const total = D.cpm_modules.length;
  const tc = Object.values(taught).filter(Boolean).length;
  const mn = D.standards.filter(s => s.framework === 'MN-2022' && ['6','7','8','9'].includes(s.grade));
  const cov = mn.filter(s => lookup(stdToMods, s.id).length > 0).length;
  document.getElementById('statsBar').innerHTML =
    `<div class="stat">Modules: <b>${tc}/${total}</b> taught</div>` +
    `<div class="stat">MN-2022 (6-12): <b>${cov}/${mn.length}</b></div>` +
    `<div class="stat">Gaps: <b>${mn.length - cov}</b></div>`;
}

// ── Tab 1: Coverage Dashboard ──
function renderDashboard() {
  const fw = document.getElementById('fw-filter').value;
  const grade = document.getElementById('grade-filter').value;
  const status = document.getElementById('status-filter').value;
  const search = document.getElementById('search-filter').value.toLowerCase();

  let stds = D.standards.filter(s => s.framework === fw);
  if (grade) stds = stds.filter(s => s.grade === grade);
  if (search) stds = stds.filter(s =>
    (s.code||'').toLowerCase().includes(search) ||
    (s.description||'').toLowerCase().includes(search) ||
    (s.domain||'').toLowerCase().includes(search) ||
    (s.topic||'').toLowerCase().includes(search));

  // Count coverage
  const allFiltered = stds.length;
  let covCount = 0, gapCount = 0, overCount = 0;
  stds.forEach(s => {
    const n = lookup(stdToMods, s.id).length;
    if (n === 0) gapCount++;
    else { covCount++; if (n > 2) overCount++; }
  });

  if (status === 'gap') stds = stds.filter(s => lookup(stdToMods, s.id).length === 0);
  else if (status === 'covered') stds = stds.filter(s => lookup(stdToMods, s.id).length > 0);
  else if (status === 'over') stds = stds.filter(s => lookup(stdToMods, s.id).length > 2);

  const pct = allFiltered > 0 ? Math.round(covCount / allFiltered * 100) : 0;

  document.getElementById('dashSummary').innerHTML =
    `<div class="summary-card ${pct >= 80 ? 'good' : pct >= 50 ? 'warn' : 'bad'}"><div class="number">${pct}%</div><div class="label">Coverage</div></div>` +
    `<div class="summary-card good"><div class="number">${covCount}</div><div class="label">Covered</div></div>` +
    `<div class="summary-card ${gapCount ? 'bad' : 'good'}"><div class="number">${gapCount}</div><div class="label">Gaps</div></div>` +
    `<div class="summary-card ${overCount ? 'warn' : 'good'}"><div class="number">${overCount}</div><div class="label">Overcovered (3+)</div></div>` +
    `<div class="summary-card"><div class="number">${stds.length}</div><div class="label">Showing</div></div>`;

  let html = '<table class="data"><thead><tr>' +
    '<th>Code</th><th>Grade</th><th>Domain</th><th>Description</th><th>Status</th><th>CPM Coverage</th>' +
    '</tr></thead><tbody>';

  stds.slice(0, 300).forEach(s => {
    const mods = lookup(stdToMods, s.id);
    const n = mods.length;
    let badge;
    if (n === 0) badge = '<span class="badge gap">GAP</span>';
    else if (n > 2) badge = `<span class="badge over">${n}x</span>`;
    else badge = `<span class="badge covered">${n}x</span>`;

    // Show which CPM courses/lessons cover this
    const modLabels = mods.map(m => {
      const mod = modById[m.module_id];
      const label = mod ? (mod.lesson || mod.section || 'Ch' + mod.chapter) : '?';
      return `<span class="badge course">${m.course_id} ${label}</span>`;
    }).join(' ');

    const desc = s.description || s.topic || '';
    html += `<tr>
      <td><code style="font-weight:600">${s.code||''}</code></td>
      <td>${s.grade||''}</td>
      <td style="font-size:12px">${s.domain||''}</td>
      <td style="max-width:350px;font-size:12px">${desc.slice(0, 200)}${desc.length > 200 ? '...' : ''}</td>
      <td>${badge}</td>
      <td style="max-width:250px">${modLabels || '<span style="color:var(--red);font-size:12px">No CPM lesson aligned</span>'}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  if (stds.length > 300) html += `<p style="color:var(--gray);margin-top:8px">Showing 300 of ${stds.length}. Use filters to narrow.</p>`;
  document.getElementById('dashGrid').innerHTML = html;
}

// ── Tab 2: Gap Analysis ──
function renderGaps() {
  const fw = document.getElementById('gap-fw-filter').value;
  const grade = document.getElementById('gap-grade-filter').value;

  let stds = D.standards.filter(s => s.framework === fw);
  if (grade) stds = stds.filter(s => s.grade === grade);
  const gaps = stds.filter(s => lookup(stdToMods, s.id).length === 0);

  // Group by grade → domain
  const grouped = {};
  gaps.forEach(s => {
    const g = s.grade || '?';
    const d = s.domain || 'Other';
    if (!grouped[g]) grouped[g] = {};
    if (!grouped[g][d]) grouped[g][d] = [];
    grouped[g][d].push(s);
  });

  if (gaps.length === 0) {
    document.getElementById('gapContent').innerHTML =
      '<div class="card" style="text-align:center;padding:40px"><h3 style="color:var(--green)">No Gaps!</h3><p>Every standard in this framework has at least one CPM module aligned.</p></div>';
    return;
  }

  let html = `<div class="card"><h3>${gaps.length} Uncovered Standards in ${fw}</h3><p style="color:var(--gray)">These standards have no CPM lesson alignment in the current data.</p></div>`;

  Object.keys(grouped).sort(gradeSort).forEach(g => {
    html += `<div class="card"><h3>Grade ${g}</h3>`;
    Object.keys(grouped[g]).sort().forEach(d => {
      html += `<h4 style="margin:8px 0 4px;color:var(--gray);font-size:13px">${d}</h4>`;
      html += '<table class="data"><thead><tr><th>Code</th><th>Benchmark</th></tr></thead><tbody>';
      grouped[g][d].forEach(s => {
        html += `<tr><td><code>${s.code}</code></td><td style="font-size:12px">${(s.description || s.topic || '').slice(0, 250)}</td></tr>`;
      });
      html += '</tbody></table>';
    });
    html += '</div>';
  });

  document.getElementById('gapContent').innerHTML = html;
}

// ── Tab 3: Module Tracker ──
function renderTracker() {
  const cf = document.getElementById('tracker-course-filter').value;
  let courses = D.cpm_courses;
  if (cf) courses = courses.filter(c => c.id === cf);

  const tree = {};
  D.cpm_modules.forEach(m => {
    if (cf && m.course_id !== cf) return;
    if (!tree[m.course_id]) tree[m.course_id] = {};
    const ch = m.chapter || 0;
    if (!tree[m.course_id][ch]) tree[m.course_id][ch] = [];
    tree[m.course_id][ch].push(m);
  });

  const relevantMods = D.cpm_modules.filter(m => !cf || m.course_id === cf);
  const totalMods = relevantMods.length;
  const taughtCount = relevantMods.filter(m => taught[m.id]).length;
  const pct = totalMods > 0 ? Math.round(taughtCount / totalMods * 100) : 0;

  const taughtStds = new Set();
  D.cpm_standard_alignments.forEach(a => { if (taught[a.module_id]) taughtStds.add(a.standard_id); });

  document.getElementById('trackerSummary').innerHTML =
    `<div class="summary-card ${pct > 80 ? 'good' : pct > 50 ? 'warn' : 'bad'}"><div class="number">${pct}%</div><div class="label">Modules Taught</div></div>` +
    `<div class="summary-card"><div class="number">${taughtCount}/${totalMods}</div><div class="label">Checked</div></div>` +
    `<div class="summary-card good"><div class="number">${taughtStds.size}</div><div class="label">Standards Covered</div></div>`;

  let html = '<div class="tree">';
  courses.forEach(course => {
    if (!tree[course.id]) return;
    const cMods = D.cpm_modules.filter(m => m.course_id === course.id);
    const cTaught = cMods.filter(m => taught[m.id]).length;
    const cPct = cMods.length > 0 ? Math.round(cTaught / cMods.length * 100) : 0;

    html += `<div class="tree-course"><div class="tree-header" onclick="toggleTree(this)">
      <span><span class="toggle">&#9654;</span> ${course.name} (${course.id})</span>
      <span>${cTaught}/${cMods.length} <span class="coverage-meter"><span class="fill" style="width:${cPct}%"></span></span></span>
    </div><div class="tree-children">`;

    Object.keys(tree[course.id]).sort((a,b) => a - b).forEach(ch => {
      const mods = tree[course.id][ch];
      const chT = mods.filter(m => taught[m.id]).length;
      html += `<div class="tree-chapter"><div class="tree-header" onclick="toggleTree(this)">
        <span><span class="toggle">&#9654;</span> Chapter ${ch}</span><span>${chT}/${mods.length}</span>
      </div><div class="tree-children">`;

      mods.forEach(m => {
        const stds = lookup(modToStds, m.id);
        const label = m.lesson || m.section || 'Ch' + m.chapter;
        html += `<div class="tree-module">
          <input type="checkbox" ${taught[m.id] ? 'checked' : ''} onchange="toggleTaught(${m.id},this.checked)">
          <span class="lesson-id">${label}</span>
          <span class="concepts">${(m.core_concepts || '').slice(0, 60)}</span>
          <span class="std-count">${stds.length} std${stds.length !== 1 ? 's' : ''}</span>
        </div>`;
      });
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('trackerTree').innerHTML = html;
}

function toggleTree(el) {
  const ch = el.nextElementSibling;
  if (ch) { ch.classList.toggle('open'); const t = el.querySelector('.toggle'); if (t) t.textContent = ch.classList.contains('open') ? '\u25BC' : '\u25B6'; }
}
function toggleTaught(id, v) {
  taught[id] = v;
  localStorage.setItem('rms_taught', JSON.stringify(taught));
  updateStatsBar();
  renderTracker();
}
function exportChecked() {
  const data = { exported: new Date().toISOString(), taught: {} };
  Object.entries(taught).forEach(([id, v]) => { if (v) { const m = modById[id]; if (m) data.taught[id] = { course: m.course_id, lesson: m.lesson || m.section }; } });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
  a.download = 'taught_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function clearChecked() { if (confirm('Clear all?')) { taught = {}; localStorage.removeItem('rms_taught'); renderTracker(); updateStatsBar(); } }

// ── Tab 4: Skip Impact ──
function populateImpactSelect() {
  const sel = document.getElementById('impact-module-select');
  D.cpm_courses.forEach(c => {
    const g = document.createElement('optgroup');
    g.label = c.name;
    D.cpm_modules.filter(m => m.course_id === c.id).forEach(m => {
      const stds = lookup(modToStds, m.id);
      g.appendChild(new Option(
        `${m.lesson || m.section || 'Ch' + m.chapter} - ${(m.core_concepts || '').slice(0, 40)} (${stds.length} stds)`,
        m.id
      ));
    });
    sel.appendChild(g);
  });
}

function renderImpact() {
  const mid = parseInt(document.getElementById('impact-module-select').value);
  if (!mid) return;
  const mod = modById[mid];
  const stds = lookup(modToStds, mid);

  const unique = stds.filter(s => lookup(stdToMods, s.standard_id).length === 1);
  const shared = stds.filter(s => lookup(stdToMods, s.standard_id).length > 1);

  let html = `<div class="card"><h3>Skip Impact: ${mod.course_id} ${mod.lesson || mod.section || 'Ch' + mod.chapter}</h3>
    <p style="color:var(--gray)">${mod.core_concepts || ''}</p>
    <p>Covers <b>${stds.length}</b> standard${stds.length !== 1 ? 's' : ''}.</p></div>`;

  if (unique.length > 0) {
    html += `<div class="card"><h4 style="color:var(--red);margin-bottom:8px">Would Create ${unique.length} NEW GAP${unique.length > 1 ? 'S' : ''}</h4>
      <p style="font-size:12px;color:var(--gray);margin-bottom:8px">Only this module covers these standards.</p><ul class="impact-list">`;
    unique.forEach(s => {
      const std = stdById[s.standard_id];
      html += `<li><code>${std?.code||''}</code> (${s.framework}) — ${(std?.description||'').slice(0, 120)}</li>`;
    });
    html += '</ul></div>';
  } else {
    html += '<div class="card" style="border-left:3px solid var(--green)"><b>No new gaps.</b> All standards here are also covered by other modules.</div>';
  }

  if (shared.length > 0) {
    html += `<div class="card"><h4 style="color:var(--green);margin-bottom:8px">Still Covered Elsewhere (${shared.length})</h4>
      <table class="data"><thead><tr><th>Code</th><th>Also In</th></tr></thead><tbody>`;
    shared.slice(0, 20).forEach(s => {
      const others = lookup(stdToMods, s.standard_id).filter(m => m.module_id !== mid);
      const names = others.map(m => `<span class="badge course">${m.course_id} ${(modById[m.module_id]?.lesson || modById[m.module_id]?.section || '')}</span>`).join(' ');
      html += `<tr><td><code>${s.code}</code></td><td>${names}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  document.getElementById('impactContent').innerHTML = html;
}

// ── Tab 5: Framework Comparison ──
function renderComparison() {
  const grade = document.getElementById('compare-grade-filter').value;
  const cn = document.getElementById('compare-cluster-filter').value;

  let clusters = D.topic_clusters;
  if (grade) clusters = clusters.filter(c => c.grade === grade);
  if (cn) clusters = clusters.filter(c => c.name === cn);

  const csMap = {};
  D.cluster_standards.forEach(cs => { if (!csMap[cs.cluster_id]) csMap[cs.cluster_id] = []; csMap[cs.cluster_id].push(cs.standard_id); });

  const fws = ['CCSS-M', 'MN-2007', 'MN-2022', 'TEKS', 'FL-BEST', 'VA-SOL'];
  let html = `<div class="comparison-grid" style="grid-template-columns: 60px 140px repeat(6, 1fr);">`;
  html += '<div class="cell header">Grade</div><div class="cell header">Topic</div>';
  fws.forEach(fw => html += `<div class="cell header">${fw}</div>`);

  clusters.slice(0, 100).forEach(c => {
    const sids = csMap[c.id] || [];
    html += `<div class="cell">${c.grade || ''}</div><div class="cell" style="font-weight:500">${c.name}</div>`;
    fws.forEach(fw => {
      const fStds = sids.map(id => stdById[id]).filter(s => s && s.framework === fw);
      if (fStds.length > 0) {
        const codes = fStds.map(s => s.code).join(', ');
        html += `<div class="cell present" title="${codes}">${fStds.length} std${fStds.length > 1 ? 's' : ''}<br><small>${codes.slice(0, 40)}</small></div>`;
      } else {
        html += '<div class="cell missing">--</div>';
      }
    });
  });
  html += '</div>';
  document.getElementById('compareContent').innerHTML = html;
}

init();
</script>
</body>
</html>
